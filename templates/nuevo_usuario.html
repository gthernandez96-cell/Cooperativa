{% extends "base.html" %}
{% block title %}Crear Usuario — Cooperativa Quetzal{% endblock %}
{% block content %}
<div class="page-header">
  <div>
    <div class="page-title">Crear Usuario</div>
    <div class="page-subtitle">Asignar acceso al sistema</div>
  </div>
  <a href="{{ url_for('usuarios') }}" class="btn btn-outline">← Volver</a>
</div>

<div class="card" style="max-width:700px;">
  <div class="card-body">
    <form method="post">
      <div class="form-grid">
        <div class="form-group">
          <label>Nombre de usuario *</label>
          <input name="username" required placeholder="Ej: jgomez">
        </div>
        <div class="form-group">
          <label>Contraseña *</label>
          <input name="password" type="password" required placeholder="******">
        </div>
        <div class="form-group" style="grid-column: span 2;">
          <label>Rol *</label>
          <select name="rol_id" required>
            <option value="">Seleccionar rol</option>
            {% for r in roles %}
            <option value="{{ r.id }}">{{ r.nombre }}</option>
            {% endfor %}
          </select>
        </div>
      </div>
      <div class="form-actions">
        <button type="submit" class="btn btn-primary">Crear usuario</button>
        <a href="{{ url_for('usuarios') }}" class="btn btn-outline">Cancelar</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
